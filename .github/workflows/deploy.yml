name: Application Deployment Pipeline

on:
  workflow_run:
    workflows: ["Terraform Infrastructure Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-infrastructure:
    name: Verify if the Infrastructure is Ready
    runs-on: ubuntu-latest
    steps:
      - name: Check Infrastructure Pipeline Status
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Infrastructure pipeline did not succeed. Aborting deployment."
            exit 1
          fi
          echo "Infrastructure pipeline succeeded. Proceeding with deployment."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: verify-infrastructure
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
            ./backend

      - name: Push Backend Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
            ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          [ -z "${{ secrets.EC2_HOST }}" ] && echo "EC2_HOST secret missing" && exit 1
          [ -z "${{ secrets.EC2_USER }}" ] && echo "EC2_USER secret missing" && exit 1
          [ -z "${{ secrets.EC2_SSH_KEY }}" ] && echo "EC2_SSH_KEY secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_USERNAME }}" ] && echo "DOCKER_USERNAME secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_PASSWORD }}" ] && echo "DOCKER_PASSWORD secret missing" && exit 1
          echo "All required secrets are configured"

      - name: Copy deployment compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Create remote environment file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USER }}/app
            cat > /home/${{ secrets.EC2_USER }}/app/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            EOF

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app

            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.deploy.yml pull

            echo "Stopping existing containers..."
            docker compose -f docker-compose.deploy.yml down || true

            echo "Starting new containers..."
            docker compose -f docker-compose.deploy.yml up -d

            echo "Waiting for services to be healthy..."
            sleep 10

      - name: Health Check
        run: |
          echo "Verifying application is running..."
          for i in {1..5}; do
            if curl -f http://${{ secrets.EC2_HOST }}:80 > /dev/null 2>&1; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Retry $i/5 - waiting for app to be ready..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Notify Success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed!"