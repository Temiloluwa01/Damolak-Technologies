name: Application Deployment Pipeline

on:
  workflow_run:
    workflows: ["Terraform Infrastructure Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-infrastructure:
    name: Verify if the Infrastructure is Ready
    runs-on: ubuntu-latest
    steps:
      - name: Check Infrastructure Pipeline Status
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Infrastructure pipeline did not succeed. Aborting deployment."
            exit 1
          fi
          echo "Infrastructure pipeline succeeded. Proceeding with deployment."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: verify-infrastructure
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test DockerHub Connectivity
        run: |
          echo "Testing DockerHub connectivity..."
          timeout 30 docker pull hello-world:latest || echo "Pull test failed, but continuing..."
          docker rmi hello-world:latest 2>/dev/null || true

      - name: Build Backend Docker Image
        run: |
          docker build \
            --compress \
            --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
            ./backend

      - name: Push Backend Docker Image
        run: |
          echo "Pushing backend:${{ steps.meta.outputs.tag }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} || docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }}
          echo "Pushing backend:latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest || docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build \
            --compress \
            --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
            ./frontend

      - name: Push Frontend Docker Image
        run: |
          echo "Pushing frontend:${{ steps.meta.outputs.tag }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} || docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }}
          echo "Pushing frontend:latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest || docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          [ -z "${{ secrets.EC2_HOST }}" ] && echo "EC2_HOST secret missing" && exit 1
          [ -z "${{ secrets.EC2_USER }}" ] && echo "EC2_USER secret missing" && exit 1
          [ -z "${{ secrets.EC2_SSH_KEY }}" ] && echo "EC2_SSH_KEY secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_USERNAME }}" ] && echo "DOCKER_USERNAME secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_PASSWORD }}" ] && echo "DOCKER_PASSWORD secret missing" && exit 1
          echo "All required secrets are configured"

      - name: Debug deployment file presence
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/docker-compose.yml"

      - name: Copy deployment compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Create remote environment file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USER }}/app
            cat > /home/${{ secrets.EC2_USER }}/app/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            EOF

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found on remote host. Installing Docker and Compose plugin..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io curl
              sudo systemctl enable docker
              sudo usermod -aG docker $USER || true
            fi

            echo "Stopping both docker service and socket..."
            sudo systemctl stop docker.service || true
            sudo systemctl stop docker.socket || true
            sleep 2

            echo "Starting docker socket and service..."
            sudo systemctl start docker.socket
            sudo systemctl start docker
            sleep 3

            echo "Fixing docker group permissions..."
            sudo usermod -aG docker $USER
            newgrp docker || true

            # Wait for Docker daemon to be fully ready
            echo "Waiting for Docker daemon to be fully operational..."
            for i in {1..90}; do
              if sudo docker ps >/dev/null 2>&1 && \
                 sudo docker info >/dev/null 2>&1 && \
                 [ -S /var/run/docker.sock ]; then
                # Test actual connectivity
                if sudo timeout 5 docker exec -i $(sudo docker ps -q 2>/dev/null | head -1) true 2>/dev/null || \
                   sudo timeout 5 docker ps -q >/dev/null 2>&1; then
                  echo "Docker daemon is fully operational"
                  break
                fi
              fi
              echo "Waiting... ($i/90)"
              sleep 1
            done

            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin not found. Installing Compose plugin..."
              sudo mkdir -p /usr/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-linux-x86_64" -o /usr/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/lib/docker/cli-plugins/docker-compose
            fi

            echo "Docker version: $(sudo docker --version)"
            echo "Docker Compose version: $(sudo docker compose version)"

            echo "Pulling latest Docker images..."
            sudo docker compose -f docker-compose.yml pull

            echo "Stopping existing containers..."
            sudo docker compose -f docker-compose.yml down || true

            echo "Starting new containers..."
            sudo docker compose -f docker-compose.yml up -d

            echo "Waiting for services to be healthy..."
            sleep 10

      - name: Health Check
        run: |
          echo "Verifying application is running..."
          for i in {1..5}; do
            if curl -f http://${{ secrets.EC2_HOST }}:80 > /dev/null 2>&1; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Retry $i/5 - waiting for app to be ready..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Fallback Deployment (if primary fails)
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app
            
            echo "Running fallback deployment strategy..."
            
            # Aggressive restart - kill all docker processes
            echo "Killing all docker processes..."
            sudo killall -9 dockerd docker || true
            sleep 2
            
            # Stop socket and service
            echo "Stopping docker socket and service..."
            sudo systemctl stop docker.service || true
            sudo systemctl stop docker.socket || true
            sleep 3
            
            # Remove potentially corrupted socket
            sudo rm -f /var/run/docker.sock /var/run/docker.sock.lock 2>/dev/null || true
            
            # Restart properly
            echo "Restarting docker infrastructure..."
            sudo systemctl start docker.socket
            sleep 2
            sudo systemctl start docker
            sleep 3
            
            # Fix permissions
            echo "Fixing permissions..."
            sudo usermod -aG docker $USER || true
            
            # Extended wait with better checks
            echo "Waiting for Docker daemon to be fully operational..."
            for i in {1..120}; do
              if sudo systemctl is-active --quiet docker && \
                 [ -S /var/run/docker.sock ] && \
                 sudo docker ps >/dev/null 2>&1; then
                echo "Docker is fully operational"
                break
              fi
              echo "Waiting... ($i/120)"
              sleep 1
            done
            
            echo "Final Docker status check..."
            sudo docker version
            
            echo "Attempting image pull..."
            sudo docker compose -f docker-compose.yml pull
            
            echo "Stopping existing containers..."
            sudo docker compose -f docker-compose.yml down || true
            
            echo "Starting new containers..."
            sudo docker compose -f docker-compose.yml up -d
            
            echo "Waiting for services to stabilize..."
            sleep 15

      - name: Final Health Check (after fallback)
        if: failure()
        run: |
          echo "Running final health check..."
          for i in {1..5}; do
            if curl -f http://${{ secrets.EC2_HOST }}:80 > /dev/null 2>&1; then
              echo "✓ Frontend is healthy after fallback"
              exit 0
            fi
            echo "Retry $i/5 - checking application health..."
            sleep 5
          done
          echo "Application still not responding"

      - name: Notify Success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed even after fallback strategy"
          echo "Please check:"
          echo "Docker daemon status on EC2"
          echo "Network connectivity to Docker registry"
          echo "EC2 instance resources (disk space, memory)"
          echo "Security group rules for EC2"