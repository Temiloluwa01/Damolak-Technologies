services:
  
  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db 

  backend:
    build: ./backend
    container_name: backend1
    ports:
      - "8080:5000"
    #environment:
     # - MONGO_URI=mongodb://mongo:27017/mern_db 
     # - PORT=5000
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
